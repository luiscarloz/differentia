<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Differentia - Jogo da Memoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TELA INICIAL -->
    <div id="screen-home" class="screen active">
        <div class="palm-left"></div>
        <div class="palm-right"></div>
        <div class="home-container">
            <div class="logo-area">
                <div class="compass-icon">
                    <svg viewBox="0 0 100 100" width="60" height="60">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#5a3e28" stroke-width="3"/>
                        <circle cx="50" cy="50" r="38" fill="none" stroke="#5a3e28" stroke-width="1"/>
                        <polygon points="50,15 55,45 50,50 45,45" fill="#c0392b"/>
                        <polygon points="50,85 55,55 50,50 45,55" fill="#5a3e28"/>
                        <circle cx="50" cy="50" r="4" fill="#5a3e28"/>
                    </svg>
                </div>
                <h1 class="logo-title">Differentia</h1>
                <p class="logo-subtitle">Um Mundo de Descobertas!</p>
            </div>
            <div class="parchment-card menu-card">
                <div class="menu-buttons">
                    <button class="btn btn-adventure" onclick="startClassicMode()">
                        <span class="btn-icon-img">
                            <svg viewBox="0 0 40 40" width="36" height="36"><rect x="2" y="2" width="36" height="36" rx="4" fill="#d4a574" stroke="#5a3e28" stroke-width="2"/><rect x="8" y="8" width="10" height="10" rx="2" fill="#8B6914"/><rect x="22" y="8" width="10" height="10" rx="2" fill="#8B6914"/><rect x="8" y="22" width="10" height="10" rx="2" fill="#8B6914"/><rect x="22" y="22" width="10" height="10" rx="2" fill="#8B6914"/></svg>
                        </span>
                        <div class="btn-content">
                            <span class="btn-text">Jogo da Memoria</span>
                            <span class="btn-desc">Encontre os pares dos personagens!</span>
                        </div>
                    </button>
                    <button class="btn btn-quest" onclick="startQuizMode()">
                        <span class="btn-icon-img">
                            <svg viewBox="0 0 40 40" width="36" height="36"><circle cx="20" cy="18" r="16" fill="#4a90d9" stroke="#2c5f8a" stroke-width="2"/><text x="20" y="24" text-anchor="middle" fill="white" font-size="20" font-weight="bold">?</text></svg>
                        </span>
                        <div class="btn-content">
                            <span class="btn-text">Memoria Quiz</span>
                            <span class="btn-desc">Perguntas e respostas!</span>
                        </div>
                    </button>
                </div>
            </div>
            <footer class="home-footer">
                <p>Metodo Lupa &bull; differentia.world</p>
            </footer>
        </div>
    </div>

    <!-- TELA DE DIFICULDADE -->
    <div id="screen-difficulty" class="screen">
        <div class="palm-left"></div>
        <div class="palm-right"></div>
        <div class="difficulty-container">
            <button class="btn-back" onclick="goHome()">&#8592; Voltar</button>
            <h2 class="screen-title" id="difficulty-title">Escolha a Dificuldade</h2>
            <div class="parchment-card">
                <div class="difficulty-buttons">
                    <button class="btn btn-easy" onclick="selectDifficulty('easy')">
                        <span class="diff-stars">&#9733;</span>
                        <div class="btn-content">
                            <span class="btn-text">Facil</span>
                            <span class="btn-desc">4 pares</span>
                        </div>
                    </button>
                    <button class="btn btn-medium" onclick="selectDifficulty('medium')">
                        <span class="diff-stars">&#9733;&#9733;</span>
                        <div class="btn-content">
                            <span class="btn-text">Medio</span>
                            <span class="btn-desc">6 pares</span>
                        </div>
                    </button>
                    <button class="btn btn-hard" onclick="selectDifficulty('hard')">
                        <span class="diff-stars">&#9733;&#9733;&#9733;</span>
                        <div class="btn-content">
                            <span class="btn-text">Dificil</span>
                            <span class="btn-desc">8 pares</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen">
        <div class="game-header">
            <button class="btn-back" onclick="goHome()">&#8592; Menu</button>
            <div class="game-stats">
                <div class="stat">
                    <span class="stat-label">Jogadas</span>
                    <span class="stat-value" id="moves-count">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pares</span>
                    <span class="stat-value" id="pairs-count">0/0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Tempo</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
            </div>
        </div>
        <div class="game-board" id="game-board"></div>
    </div>

    <!-- TELA DE VITORIA -->
    <div id="screen-win" class="screen">
        <div class="palm-left"></div>
        <div class="palm-right"></div>
        <div class="win-container">
            <div class="treasure-chest">
                <svg viewBox="0 0 120 100" width="100" height="84">
                    <rect x="10" y="40" width="100" height="55" rx="8" fill="#8B6914" stroke="#5a3e28" stroke-width="3"/>
                    <rect x="10" y="40" width="100" height="20" rx="8" fill="#a07828" stroke="#5a3e28" stroke-width="3"/>
                    <rect x="48" y="44" width="24" height="16" rx="4" fill="#f4d03f" stroke="#5a3e28" stroke-width="2"/>
                    <circle cx="60" cy="52" r="4" fill="#5a3e28"/>
                    <ellipse cx="35" cy="30" rx="8" ry="6" fill="#f4d03f"/>
                    <ellipse cx="60" cy="25" rx="8" ry="6" fill="#f4d03f"/>
                    <ellipse cx="85" cy="30" rx="8" ry="6" fill="#f4d03f"/>
                    <ellipse cx="48" cy="20" rx="6" ry="5" fill="#f7dc6f"/>
                    <ellipse cx="72" cy="22" rx="6" ry="5" fill="#f7dc6f"/>
                </svg>
            </div>
            <h2 class="win-title">Parabens!</h2>
            <p class="win-subtitle">Voce encontrou todos os pares!</p>
            <div class="parchment-card win-stats-card">
                <div class="win-stats">
                    <p>Jogadas: <strong id="win-moves">0</strong></p>
                    <p>Tempo: <strong id="win-time">00:00</strong></p>
                </div>
            </div>
            <div class="win-buttons">
                <button class="btn btn-adventure" onclick="restartGame()">
                    <div class="btn-content">
                        <span class="btn-text">Jogar de Novo</span>
                    </div>
                </button>
                <button class="btn btn-quest" onclick="goHome()">
                    <div class="btn-content">
                        <span class="btn-text">Menu Principal</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
